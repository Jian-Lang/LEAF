dataset: MHClipEN
model: unsloth/Qwen2.5-VL-3B-Instruct-unsloth-bnb-4bit
short_name: qwen2.5-vl-3b
mark: zz
strategy: reason-explain
num_img: 4
eval_strategy: detection

dataset_cfg:
  {}
peft_cfg:
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  random_state: 3407
  use_rslora: false
  loftq_config: null
reason_trainer_cfg:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  # warmup_steps: 15
  warmup_ratio: 0.1
  num_train_epochs: 3
  learning_rate: 5e-5
  optim: adamw_8bit
  weight_decay: 0.01
  lr_scheduler_type: cosine
  seed: 3407
  max_seq_length: 32768
trainer_cfg:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  # warmup_steps: 10
  warmup_ratio: 0.1
  num_train_epochs: 2
  learning_rate: 9e-4
  optim: adamw_8bit
  weight_decay: 0.01
  lr_scheduler_type: cosine
  seed: 3407
  max_seq_length: 32768
